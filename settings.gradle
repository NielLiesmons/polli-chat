pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven {
            url = uri("https://www.jitpack.io")
        }
    }
}

rootProject.name = "polli-chat"
include(":polli-core", ":polli-domain", ":polli-ui", ":chatmail-rpc-client", ":polli-engine", ":polli-desktop", ":state-cryptree")
