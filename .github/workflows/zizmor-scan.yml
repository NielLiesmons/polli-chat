name: GitHub Actions Security Analysis with zizmor

on:
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work ghcr.io/zizmorcore/zizmor:1.24.1 .
