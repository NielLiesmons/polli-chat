name: Chat perf (JVM)

on:
  pull_request:
    paths:
      - 'polli-ui/**'
      - 'polli-domain/**'
      - 'polli-engine/**'
      - 'src/main/java/com/polli/android/chat/**'
      - 'scripts/run-chat-perf.sh'
  push:
    branches: [main]

jobs:
  jvm-feed-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Run JVM chat feed perf gate
        run: ./scripts/run-chat-perf.sh
